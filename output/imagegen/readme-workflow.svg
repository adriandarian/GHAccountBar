<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="560" viewBox="0 0 1400 560" role="img" aria-labelledby="title desc">
  <title id="title">GH Account Bar workflow</title>
  <desc id="desc">Three-step workflow showing how GH Account Bar reads gh auth status, lets you choose an account, and runs gh auth switch.</desc>
  <defs>
    <linearGradient id="panelA" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#eef7f5"/>
    </linearGradient>
    <linearGradient id="panelB" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#f8f0e8"/>
    </linearGradient>
    <linearGradient id="panelC" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#eef2fb"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="20" flood-color="#29323d" flood-opacity="0.16"/>
    </filter>
  </defs>
  <rect width="1400" height="560" fill="#f8fafc"/>
  <text x="80" y="84" font-family="Inter, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="44" font-weight="780" fill="#17202a">A tiny bridge between the menu bar and GitHub CLI</text>
  <text x="80" y="126" font-family="Inter, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="22" font-weight="520" fill="#5b6877">The app stays out of the way until you need to move between identities.</text>

  <g transform="translate(80 178)" filter="url(#shadow)">
    <rect width="350" height="284" rx="22" fill="url(#panelA)" stroke="#d8e2e8"/>
    <circle cx="54" cy="56" r="22" fill="#2f855a"/>
    <text x="54" y="64" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="24" font-weight="800" fill="#ffffff">1</text>
    <text x="36" y="116" font-family="Inter, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="28" font-weight="760" fill="#17202a">Read accounts</text>
    <text x="36" y="156" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="18" fill="#344050">gh auth status</text>
    <text x="36" y="184" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="18" fill="#344050">--json hosts</text>
    <text x="36" y="236" font-family="Inter, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="18" font-weight="520" fill="#657386">Only successful logins are shown.</text>
  </g>

  <path d="M464 320h78" stroke="#7a8796" stroke-width="4" stroke-linecap="round"/>
  <path d="M532 304l24 16-24 16" fill="none" stroke="#7a8796" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>

  <g transform="translate(584 178)" filter="url(#shadow)">
    <rect width="350" height="284" rx="22" fill="url(#panelB)" stroke="#e5d7c7"/>
    <circle cx="54" cy="56" r="22" fill="#d97706"/>
    <text x="54" y="64" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="24" font-weight="800" fill="#ffffff">2</text>
    <text x="36" y="116" font-family="Inter, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="28" font-weight="760" fill="#17202a">Pick an identity</text>
    <rect x="36" y="144" width="278" height="44" rx="12" fill="#ffffff" stroke="#eadaca"/>
    <circle cx="62" cy="166" r="9" fill="#2f855a"/>
    <text x="82" y="173" font-family="Inter, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="18" font-weight="650" fill="#344050">personal-account</text>
    <rect x="36" y="198" width="278" height="44" rx="12" fill="#ffffff" stroke="#eadaca"/>
    <circle cx="62" cy="220" r="9" fill="#cbd5e1"/>
    <text x="82" y="227" font-family="Inter, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="18" font-weight="650" fill="#344050">work-account</text>
  </g>

  <path d="M968 320h78" stroke="#7a8796" stroke-width="4" stroke-linecap="round"/>
  <path d="M1036 304l24 16-24 16" fill="none" stroke="#7a8796" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>

  <g transform="translate(1088 178)" filter="url(#shadow)">
    <rect width="232" height="284" rx="22" fill="url(#panelC)" stroke="#d7deef"/>
    <circle cx="54" cy="56" r="22" fill="#2563eb"/>
    <text x="54" y="64" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="24" font-weight="800" fill="#ffffff">3</text>
    <text x="36" y="116" font-family="Inter, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="28" font-weight="760" fill="#17202a">Switch</text>
    <text x="36" y="156" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="17" fill="#344050">gh auth switch</text>
    <text x="36" y="184" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="17" fill="#344050">--hostname</text>
    <text x="36" y="212" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="17" fill="#344050">--user</text>
    <text x="36" y="254" font-family="Inter, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="18" font-weight="520" fill="#657386">Then refresh menu state.</text>
  </g>
</svg>
